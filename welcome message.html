<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome message</title>
</head>
<body>
    <h3>What is your name?</h3>
    <input type="text" id="name" value="Laurence Sveikis">
    <button onclick="Welcome()">Submit</button>
    <p id="message"></p>

    <script>
        function welcome(){
            let name = document.getElementById("name").value;
            if(name.length > 3){
                document.getElementById("message").innerHTML = "Welcome to the site" + name;

                }
                else{
                    alert("Name must be more than 3 characters")
                }
            }
            welcome();
    </script>
</body>
</html>
