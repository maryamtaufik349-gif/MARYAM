<!DOCTYPE html>
<html>
<head>
    
    <title>Pizza Form</title>
</head>
<body>
    <h2 align="center">PIZZA ORDER FORM</h2>

    <form>
        <fieldset>
            <legend>Delivery Address</legend>

            <table>
                <tr>
            <td>Full Name:</td> 
            <td><input type="text" placeholder="Ful Name"></td>

            <td>Street Address:</td>
            <td><input type="text" placeholder="Address"></td>
                </tr>
                
                <tr>
            <td>Phone:</td>
            <td><input type="text" placeholder="Phone"></td>

            <td>E-mail:</td> 
            <td><input type="email" placeholder="E-mail"></td>
                </tr>

                <tr>
            <td>Password:</td> 
            <td><input type="password" placeholder="Password"></td>
                </tr>
            </table>

        </fieldset>

        <br>

        <fieldset>
            <legend>Payment Information</legend>

            <table>
                <tr>
            <td>Card Type:</td>
            <td>
            <select>
                <option>Visa</option>
                <option>Mastercard</option>
                <option>Discover</option>
            </select>
            </td>


            <td>Card Number:</td> 
            <td><input type="text" placeholder="Card Number"></td>
                </tr>

                <tr>
                    <td>Name on Card:</td>
                    <td><input type="text" placeholder="Name"></td>
                </tr>
            </table>

            </fieldset>

            <br>
            
            <fieldset>
                <legend>Customize Your Pizza</legend>

                <table>

                    <tr>
            <td>Pizza Size:</td>
            <td>
            <select>
                <option selected>Large</option>
                <option>Medium</option>
                <option>Small</option>
            </select>
            </td>

            <td>Quantity:</td> 
            <td><input type="number"></td>
                    </tr>
                    
                    <tr>
                        <td>Spices:</td>
                        <td colspan="3">
                            <input type="checkbox"> Black pepper
                            <input type="checkbox"> Bell peppers
                            <input type="checkbox"> Mayonnaise
                        </td>
                    </tr>

                    <tr>
                        <td>Other Requirements:</td>
                        <td colspan="3">
                            <textarea rows="3" cols="30" placeholder="Any Other Requirements"></textarea>
                        </td>
                    </tr>
                    
                    <tr>
                    <td>Meat:</td>
                    <td>
                        <input type="radio" name="meat"> Fish
                        <input type="radio" name="meat"> Cow
                        <input type="radio" name="meat"> Chicken
                    </td>
                    </tr>

                </table>

        </fieldset>

        <br>

        <input type="reset" value="Clear Order">
        <input type="submit" value="Place Order">

    </form>

</body>
</html>
